<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>装備画像メーカー</title>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="data.js"></script>
<script defer src="script.js"></script>

<style>
body {
  font-family: sans-serif;
  margin:0;
  padding:10px;
  background:#eee;
}

/* ===== 入力UI ===== */
.card {
  border:1px solid #aaa;
  padding:8px;
  margin-bottom:6px;
  background:#fff;
}

/* ===== プレビュー ===== */
.preview {
  margin-top:20px;
}

/* ===== 画像部分 ===== */
.capture {
  width:1200px;
  background:#ffffff;
  padding:20px;
  box-sizing:border-box;
  font-size:18px;
}

/* タイトル */
.title {
  text-align:center;
  font-size:28px;
  font-weight:bold;
  margin-bottom:20px;
}

/* セクション */
.section {
  margin-bottom:20px;
}

.section-title {
  font-weight:bold;
  border-bottom:2px solid #000;
  margin-bottom:10px;
}

/* 武器2カラム */
.weapon-grid {
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:10px;
}

/* ボックス */
.box {
  border:2px solid #000;
  padding:8px;
}

/* アクセ＆シジル */
.row-grid {
  display:grid;
  grid-template-columns: repeat(4, 1fr);
  gap:10px;
}

.small {
  font-size:14px;
  color:#333;
}
</style>
</head>

<body>

<h2>装備入力</h2>

<h3>ビルド管理</h3>
<input id="buildName" placeholder="ビルド名">
<button onclick="saveBuild()">保存</button>
<button onclick="loadBuild()">読込</button>
<button onclick="deleteBuild()">削除</button>
<span id="saveStatus" class="small"></span>
<hr>
<h4>保存済みビルド</h4>
<div id="buildList"></div>
<hr>

<h3>武器 <span id="wCount"></span></h3>
<button onclick="addWeapon()">＋</button>
<button onclick="removeWeapon()">－</button>
<div id="weapons"></div>

<h3>アクセ <span id="aCount"></span></h3>
<button onclick="addAcc()">＋</button>
<button onclick="removeAcc()">－</button>
<div id="accessories"></div>

<h3>シジル <span id="sCount"></span></h3>
<button onclick="addSigil()">＋</button>
<button onclick="removeSigil()">－</button>
<div id="sigils"></div>

<button onclick="render()">反映</button>
<button onclick="download()">画像ダウンロード</button>
<button onclick="generateURL()">共有URL作成</button>
<input id="shareURL" style="width:100%" readonly>

<hr>

<h2>プレビュー</h2>

<div class="preview">
<div id="capture" class="capture"></div>
</div>


</body>
</html>
